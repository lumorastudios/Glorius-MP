name: Build PocketMine-MP.phar

# Runs automatically on every push to any branch, and can also be triggered
# manually from the "Actions" tab on GitHub (the "Run workflow" button).
on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build server phar
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Download the pmmp-specific PHP binary DIRECTLY (rather than through a
      # third-party action, which turned out to reference an outdated/stale
      # release tag). This URL & asset name was confirmed from the official
      # Pterodactyl PocketMine-MP egg script currently used in production.
      - name: Download pmmp PHP binary
        run: |
          curl --location --fail --progress-bar \
            "https://github.com/pmmp/PHP-Binaries/releases/download/pm5-latest/PHP-8.2-Linux-x86_64-PM5.tar.gz" \
            -o php-pm5.tar.gz
          tar -xzf php-pm5.tar.gz
          ./bin/php7/bin/php --version

      # Per pmmp's official BUILDING.md: run composer USING the custom PHP
      # binary above, so the "make-server" step (dependency install + phar
      # build) consistently uses the same PHP from start to finish.
      - name: Build via composer make-server
        run: ./bin/php7/bin/php "$(which composer)" make-server

      - name: Upload phar as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketMine-MP-phar
          path: PocketMine-MP.phar
          if-no-files-found: error
